name: Bug report
description: Report a problem with a component or build
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or a CodeSandbox/StackBlitz link.
      placeholder: |
        1. Render `<Button variant="primary" />`
        2. Click it
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version / commit SHA
      placeholder: "github:LivTorgEx/ui-kit#<sha>"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Next.js 16.2.4, React 19.2, Node 22, Chrome 128"
    validations:
      required: true
